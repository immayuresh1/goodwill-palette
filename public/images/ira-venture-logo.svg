<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180" fill="none">
  <!-- Ira Venture Nx - Building silhouette logo -->
  <!-- Left building -->
  <rect x="30" y="60" width="22" height="100" rx="2" fill="#c49a2a"/>
  <rect x="26" y="80" width="8" height="80" rx="1" fill="#c49a2a"/>
  <!-- Center tall building (green) -->
  <rect x="62" y="20" width="16" height="140" rx="2" fill="#1a5c2a"/>
  <polygon points="70,5 78,20 62,20" fill="#1a5c2a"/>
  <!-- Right building -->
  <rect x="88" y="50" width="22" height="110" rx="2" fill="#c49a2a"/>
  <!-- Small red accent -->
  <rect x="112" y="90" width="8" height="40" rx="1" fill="#cc2a2a"/>
  <!-- Right outer building -->
  <rect x="118" y="60" width="22" height="100" rx="2" fill="#c49a2a"/>
  <!-- Base line -->
  <rect x="22" y="158" width="122" height="4" rx="1" fill="#c49a2a"/>
  <!-- Text -->
  <text x="100" y="178" font-family="Georgia, serif" font-size="13" fill="#2a2a2a" text-anchor="middle" letter-spacing="3">IRA VENTURE NX</text>
</svg>
